version: '3.8'

services:
  # -------------------------------------------------------
  # 1. API Gateway (Target Skripsi)
  # -------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skripsi-gateway
    ports:
      - "8080:8080"
    environment:
      # Asumsi: App Anda bisa override config via ENV (Opsional)
      - APP_ENV=production
    volumes:
      # Mount config agar bisa diubah tanpa rebuild image
      - ./configs:/configs
    deploy:
      resources:
        limits:
          cpus: '0.5'        # Batasi 0.5 core
          memory: 256M       # Batasi 256MB RAM

  # -------------------------------------------------------
  # 2. Mock Server (Upstream Service)
  # -------------------------------------------------------
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: skripsi-mock
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '0.2'        # Mock sangat ringan
          memory: 64M

  # -------------------------------------------------------
  # 3. K6 Load Tester
  # -------------------------------------------------------
  k6:
    image: grafana/k6:latest
    container_name: skripsi-k6
    depends_on:
      - api-gateway
    environment:
      # Inject URL target ke script k6
      - TARGET_URL=http://api-gateway:8080
    volumes:
      # Mount folder performance lokal ke dalam container
      - ./performance:/scripts
    # Perintah jalankan test
    # Ganti 'breaker_test.js' dengan nama file script Anda yang sebenarnya
    command: run /scripts/load-test.js