services:
  # -------------------------------------------------------
  # 1. API Gateway (Target Skripsi)
  # -------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api-gateway
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - APP_ENV=production
      - GOMAXPROCS=2
    volumes:
      - ./configs:/configs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'

    restart: on-failure

  # -------------------------------------------------------
  # 2. Mock Server (Upstream Service)
  # -------------------------------------------------------
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: mock-server
    ports:
      - "9090:9090"
    environment:
      - GOMAXPROCS=4
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G

  # -------------------------------------------------------
  # 3. K6 Load Tester (Over-resourced agar bukan bottleneck)
  # -------------------------------------------------------
  k6:
    image: grafana/k6:latest
    container_name: k6-load-test
    depends_on:
      - api-gateway
    environment:
      - TARGET_URL=http://api-gateway:8080
    volumes:
      - ./performance:/scripts
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    command: run /scripts/load-test.js
