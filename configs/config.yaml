# ============================================================
# configs/config.yaml
# Hanya berisi NON-SECRET configuration
# ============================================================

server:
  proxy_port: 8080
  admin_port: 8081
  log_level: info

# Plugin yang berlaku untuk SEMUA route
global_plugins:
  - name: logger
    enabled: true
    config:
      format: json

# Definisi upstream (bisa multi-target untuk load balancing nanti)
upstreams:
  - id: upstream-mock-server
    name: mock-server-upstream
    algorithm: round-robin   # round-robin | least-conn | random
    targets:
      - host: mock-server
        port: 9090
        weight: 100
        health_check:
          path: /health
          interval: 10s

  - id: upstream-server1
    name: server1-upstream
    algorithm: round-robin
    targets:
      - host: localhost
        port: 5002
        weight: 100

# Definisi service (logical, tidak terikat host langsung)
services:
  - id: 089529f1-b9ad-4f4d-bdad-000055545bde
    name: server1-service
    upstream_id: upstream-server1  # referensi ke upstream
    protocol: http
    timeout: 30
    connect_timeout: 10
    read_timeout: 30
    retries: 3
    retry_backoff: 1.5
    # Plugin di level SERVICE berlaku untuk semua route service ini
    plugins:
      - name: authorization
        enabled: false
        config:
          type: jwt
          # SECRET TIDAK DI SINI — diambil dari env/secret manager

  - id: b389b2f2-9bd9-4d11-a5b7-25e39f190ab7
    name: mock-server
    upstream_id: upstream-mock-server
    protocol: http
    timeout: 30
    connect_timeout: 10
    read_timeout: 30
    retries: 2

# Definisi route
routes:
  - id: 1ba2045d-bb2e-4f86-ae06-fc6ac46c5361
    name: hello-server-1
    methods: [GET, OPTIONS]
    paths:
      - /api/v1/hello-server-1
    service_id: 089529f1-b9ad-4f4d-bdad-000055545bde
    strip_prefix: false
    # Plugin di level ROUTE — override/tambah di atas service plugin
    plugins:
      - name: rate-limiting
        enabled: true
        config:
          requests_per_minute: 100

  - id: 71b255bb-7cc8-4926-93c9-0f531115d988
    name: mock-route
    methods: [GET, OPTIONS]
    paths:
      - /mock
    service_id: b389b2f2-9bd9-4d11-a5b7-25e39f190ab7
# ```

# ---

# ## 3. Penyimpanan Secret (JWT Secret & API Key) — Yang Paling Penting untuk Skripsimu

# Ini sangat relevan dengan judul skripsimu. Ada **hierarki keamanan** dari yang paling lemah ke paling kuat:
# ```
# ❌  Hardcode di config.yaml   →  Buruk (masuk git, terbaca semua orang)
# ⚠️  Environment variable       →  Cukup untuk skripsi/dev
# ✅  .env + config.yaml hybrid  →  Lebih baik
# 🏆  Secret Manager (Vault)     →  Production-grade